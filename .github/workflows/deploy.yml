name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate sitemap
        run: |
          node -e "
          var fs = require('fs');
          var dataFile = fs.readFileSync('src/data/games.ts', 'utf8');
          var slugs = [...new Set([...dataFile.matchAll(/slug:\\s*\"([^\"]+)\"/g)].map(function(m){return m[1]}))];
          console.log('Found', slugs.length, 'games');
          var base = 'https://cool2fun.github.io';
          var today = new Date().toISOString().split('T')[0];
          var staticPages = [
            {loc: base+'/', priority: '1.0', freq: 'daily'},
            {loc: base+'/category/', priority: '0.8', freq: 'weekly'},
            {loc: base+'/about-us/', priority: '0.4', freq: 'monthly'},
            {loc: base+'/privacy-policy/', priority: '0.4', freq: 'monthly'},
            {loc: base+'/terms-of-use/', priority: '0.4', freq: 'monthly'},
            {loc: base+'/contact/', priority: '0.4', freq: 'monthly'}
          ];
          var topGames = ['slope','run-3','subway-surfers','drive-mad','retro-bowl','monkey-mart'];
          var gamePages = slugs.map(function(slug){return {loc: base+'/'+slug+'/', priority: topGames.indexOf(slug)!==-1?'0.9':'0.7', freq:'monthly'}});
          var all = staticPages.concat(gamePages);
          var xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n';
          all.forEach(function(u){
            xml += '  <url>\n    <loc>'+u.loc+'</loc>\n    <lastmod>'+today+'</lastmod>\n    <changefreq>'+u.freq+'</changefreq>\n    <priority>'+u.priority+'</priority>\n  </url>\n';
          });
          xml += '</urlset>';
          fs.writeFileSync('out/sitemap.xml', xml);
          fs.writeFileSync('out/robots.txt', 'User-agent: *\nAllow: /\n\nSitemap: '+base+'/sitemap.xml\n');
          console.log('Done');
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: main
          force_orphan: false
